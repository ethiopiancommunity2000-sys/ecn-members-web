name: Azure Static Web Apps CI/CD - ecn-members-web-prod

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build_and_deploy:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: npm install
    working-directory: ECN-Member-Management-System/clinet-app

  - run: npm run build
    working-directory: ECN-Member-Management-System/clinet-app

  - uses: Azure/static-web-apps-deploy@v1
    with:
      azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      repo_token: ${{ secrets.GITHUB_TOKEN }}
      action: upload
      app_location: ECN-Member-Management-System/clinet-app
      output_location: dist
```
